<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — David Chen Photography</title>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="https://upload-widget.cloudinary.com/latest/global/all.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root { --black: #1a1a1a; --white: #fff; --gray: #888; --light: #f5f5f5; --border: #e0e0e0; --accent: #1a1a1a; --danger: #c0392b; --success: #27ae60; --blue: #2980b9; }
  body { font-family: 'DM Sans', -apple-system, sans-serif; background: #fafafa; color: var(--black); -webkit-font-smoothing: antialiased; }

  /* ── Login ── */
  #loginScreen { display: flex; min-height: 100vh; justify-content: center; align-items: center; background: var(--white); }
  .login-box { width: 360px; text-align: center; padding: 0 24px; }
  .login-logo { height: 50px; margin-bottom: 40px; }
  .login-box h1 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
  .login-box p { font-size: 14px; color: var(--gray); margin-bottom: 32px; }
  .login-box input { width: 100%; padding: 14px 16px; border: 1px solid var(--border); background: var(--light); font-family: inherit; font-size: 15px; outline: none; margin-bottom: 16px; }
  .login-box input:focus { border-color: #999; background: var(--white); }
  .btn { display: inline-block; padding: 14px 32px; background: var(--black); color: var(--white); border: none; font-family: inherit; font-size: 13px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: background 0.2s; width: 100%; }
  .btn:hover { background: #333; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .login-error { color: var(--danger); font-size: 13px; margin-top: 12px; min-height: 20px; }

  /* ── Admin shell ── */
  #adminShell { display: none; min-height: 100vh; }
  header { position: sticky; top: 0; z-index: 100; background: var(--white); border-bottom: 1px solid var(--border); padding: 0 32px; display: flex; align-items: center; justify-content: space-between; height: 64px; }
  .header-logo { height: 32px; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .btn-sm { padding: 9px 20px; font-size: 12px; letter-spacing: 1px; width: auto; }
  .btn-outline { background: transparent; color: var(--black); border: 1px solid var(--border); }
  .btn-outline:hover { background: var(--light); }
  .btn-danger { background: var(--danger); }
  .btn-danger:hover { background: #a93226; }
  .btn-success { background: var(--success); }
  .btn-success:hover { background: #229954; }
  .btn-blue { background: var(--blue); }
  .btn-blue:hover { background: #2471a3; }

  main { max-width: 1400px; margin: 0 auto; padding: 32px; }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 32px; align-items: center; flex-wrap: wrap; }
  .tab { padding: 12px 24px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; background: none; color: var(--gray); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: color 0.2s; white-space: nowrap; }
  .tab:hover { color: var(--black); }
  .tab.active { color: var(--black); border-bottom-color: var(--black); }
  .tab-add { padding: 8px 16px; font-size: 18px; font-weight: 300; cursor: pointer; border: none; background: none; color: var(--gray); margin-left: 4px; margin-bottom: -2px; transition: color 0.2s; }
  .tab-add:hover { color: var(--black); }

  /* ── Panel ── */
  .panel { display: none; }
  .panel.active { display: block; }

  /* ── Toolbar ── */
  .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .toolbar h2 { font-size: 16px; font-weight: 600; flex: 1; }
  .save-status { font-size: 13px; color: var(--gray); }
  .save-status.saving { color: #e67e22; }
  .save-status.saved  { color: var(--success); }
  .save-status.error  { color: var(--danger); }
  .selection-info { font-size: 13px; color: var(--blue); font-weight: 600; }
  .visibility-badge { font-size: 11px; padding: 3px 8px; border-radius: 10px; font-weight: 500; margin-left: 8px; vertical-align: middle; }
  .visibility-badge.visible { background: #e8f5e9; color: #2e7d32; }
  .visibility-badge.hidden { background: #fff3e0; color: #e65100; }

  /* ── Photo grid ── */
  .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
  .photo-card { position: relative; background: var(--border); border-radius: 2px; overflow: hidden; cursor: grab; user-select: none; border: 3px solid transparent; transition: border-color 0.15s; }
  .photo-card:active { cursor: grabbing; }
  .photo-card img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; pointer-events: none; }
  .photo-card .card-actions { position: absolute; top: 6px; right: 6px; display: flex; gap: 4px; opacity: 0; transition: opacity 0.2s; }
  .photo-card:hover .card-actions { opacity: 1; }
  .card-btn { width: 28px; height: 28px; border: none; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; }
  .card-btn-delete { background: rgba(192,57,43,0.9); color: white; }
  .card-btn-delete:hover { background: var(--danger); }
  .drag-hint { position: absolute; bottom: 6px; left: 6px; background: rgba(0,0,0,0.5); color: white; font-size: 10px; padding: 2px 6px; border-radius: 2px; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
  .photo-card:hover .drag-hint { opacity: 1; }

  /* ── Multi-select ── */
  .photo-card.selected { border-color: var(--blue); }
  .photo-card.selected::before { content: '\2713'; position: absolute; top: 6px; left: 6px; width: 24px; height: 24px; background: var(--blue); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; z-index: 5; pointer-events: none; }
  .photo-card.select-mode { cursor: pointer; }
  .photo-card.select-mode:active { cursor: pointer; }
  .sortable-ghost { opacity: 0.4; }
  .btn-select-active { background: var(--blue) !important; color: white !important; border-color: var(--blue) !important; }

  .empty-state { text-align: center; padding: 80px 20px; color: var(--gray); }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state h3 { font-size: 18px; font-weight: 500; margin-bottom: 8px; color: var(--black); }
  .empty-state p { font-size: 14px; line-height: 1.6; }

  /* ── Private Galleries ── */
  .gallery-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 32px; }
  .gallery-row { background: var(--white); border: 1px solid var(--border); padding: 16px 20px; display: flex; align-items: center; gap: 16px; }
  .gallery-row-info { flex: 1; }
  .gallery-row-name { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
  .gallery-row-meta { font-size: 13px; color: var(--gray); }
  .gallery-row-actions { display: flex; gap: 8px; flex-shrink: 0; flex-wrap: wrap; }
  .copy-link-btn { position: relative; }
  .copy-tooltip { position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%); background: var(--black); color: white; font-size: 11px; padding: 4px 8px; white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .copy-link-btn.copied .copy-tooltip { opacity: 1; }

  /* ── Modals ── */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 500; justify-content: center; align-items: center; }
  .modal-bg.open { display: flex; }
  .modal-card { background: var(--white); padding: 40px; width: 420px; max-width: 90vw; }
  .modal-card h2 { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
  .modal-card p { font-size: 14px; color: var(--gray); margin-bottom: 24px; }
  .modal-card input { width: 100%; padding: 12px 14px; border: 1px solid var(--border); font-family: inherit; font-size: 15px; outline: none; margin-bottom: 16px; }
  .modal-card input:focus { border-color: #999; }
  .modal-actions { display: flex; gap: 12px; }
  .modal-actions .btn { flex: 1; }

  /* ── Confirm modal ── */
  .confirm-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 600; justify-content: center; align-items: center; }
  .confirm-bg.open { display: flex; }
  .confirm-card { background: var(--white); padding: 32px; width: 360px; max-width: 90vw; text-align: center; }
  .confirm-card h3 { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
  .confirm-card p { font-size: 14px; color: var(--gray); margin-bottom: 24px; }
  .confirm-actions { display: flex; gap: 12px; }
  .confirm-actions .btn { flex: 1; }

  /* ── Toast ── */
  #toast { position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%); background: var(--black); color: white; padding: 12px 24px; font-size: 14px; border-radius: 2px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 9999; white-space: nowrap; }
  #toast.show { opacity: 1; }

  /* ── Download progress ── */
  .download-progress { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--white); border: 1px solid var(--border); padding: 16px 24px; border-radius: 4px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); z-index: 9998; display: none; min-width: 280px; text-align: center; }
  .download-progress.active { display: block; }
  .download-progress .progress-text { font-size: 14px; margin-bottom: 8px; }
  .download-progress .progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .download-progress .progress-fill { height: 100%; background: var(--blue); transition: width 0.3s; width: 0%; }
</style>
</head>
<body>

<!-- ── LOGIN SCREEN ─────────────────────────────────────────────────────── -->
<div id="loginScreen">
  <div class="login-box">
    <img src="../logo.png" alt="David Chen Photography" class="login-logo">
    <h1>Admin Access</h1>
    <p>Enter your admin password to manage your galleries.</p>
    <input type="password" id="passwordInput" placeholder="Password" onkeydown="if(event.key==='Enter')login()">
    <button class="btn" onclick="login()" id="loginBtn">Sign In</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ── ADMIN SHELL ───────────────────────────────────────────────────────── -->
<div id="adminShell">
  <header>
    <img src="../logo.png" alt="David Chen Photography" class="header-logo">
    <div class="header-right">
      <a href="../" target="_blank" class="btn btn-sm btn-outline">View Site ↗</a>
      <button class="btn btn-sm btn-outline" onclick="logout()">Sign Out</button>
    </div>
  </header>

  <main>
    <div class="tabs" id="tabBar"></div>
    <div id="panelContainer"></div>

    <!-- Private Galleries Panel (always present) -->
    <div class="panel" id="panel-private">
      <div class="toolbar" id="privateToolbar">
        <h2>Private Client Galleries</h2>
        <button class="btn btn-sm" onclick="openCreateGallery('private')">+ New Gallery</button>
      </div>
      <div class="gallery-list" id="privateGalleryList"></div>
      <div id="privateGalleryEditor" style="display:none;">
        <div class="toolbar" style="margin-top:24px;">
          <h2 id="privateEditorTitle">Gallery Photos</h2>
          <span class="save-status" id="status-private"></span>
          <span class="selection-info" id="sel-info-private" style="display:none;"></span>
          <button class="btn btn-sm btn-danger" id="sel-delete-private" style="display:none;" onclick="deleteSelected('private')">Delete Selected</button>
          <button class="btn btn-sm btn-blue" id="sel-download-private" style="display:none;" onclick="downloadSelected('private')">Download Selected</button>
          <button class="btn btn-sm btn-outline" id="sel-start-private" style="display:none;" onclick="moveSelected('private', 'start')">Move to Start</button>
          <button class="btn btn-sm btn-outline" id="sel-end-private" style="display:none;" onclick="moveSelected('private', 'end')">Move to End</button>
          <button class="btn btn-sm btn-outline" id="sel-clear-private" style="display:none;" onclick="deselectAll('private')">Deselect</button>
          <button class="btn btn-sm btn-outline" id="sel-toggle-private" onclick="toggleSelectMode('private')">Select</button>
          <button class="btn btn-sm" onclick="openUpload('private')">+ Upload Photos</button>
          <button class="btn btn-sm btn-blue" onclick="downloadAll('private')">Download All</button>
          <button class="btn btn-sm btn-success" onclick="saveOrder('private')">Save Order</button>
          <button class="btn btn-sm btn-outline" onclick="closePrivateEditor()">← Back</button>
        </div>
        <div class="photo-grid" id="grid-private"></div>
      </div>
    </div>
  </main>
</div>

<!-- ── CREATE/RENAME GALLERY MODAL ────────────────────────────────────────── -->
<div class="modal-bg" id="galleryModal">
  <div class="modal-card">
    <h2 id="galleryModalTitle">New Gallery</h2>
    <p id="galleryModalDesc">Enter a name for this gallery.</p>
    <input type="text" id="galleryModalInput" placeholder="e.g. Weddings" onkeydown="if(event.key==='Enter')submitGalleryModal()">
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeGalleryModal()">Cancel</button>
      <button class="btn" id="galleryModalBtn" onclick="submitGalleryModal()">Create</button>
    </div>
  </div>
</div>

<!-- ── DELETE CONFIRM ─────────────────────────────────────────────────────── -->
<div class="confirm-bg" id="confirmModal">
  <div class="confirm-card">
    <h3 id="confirmTitle">Delete Photo?</h3>
    <p id="confirmDesc">This will permanently remove the photo from Cloudinary. This cannot be undone.</p>
    <div class="confirm-actions">
      <button class="btn btn-outline" onclick="cancelConfirm()">Cancel</button>
      <button class="btn btn-danger" onclick="execConfirm()">Delete</button>
    </div>
  </div>
</div>

<!-- ── TOAST ──────────────────────────────────────────────────────────────── -->
<div id="toast"></div>

<!-- ── DOWNLOAD PROGRESS ──────────────────────────────────────────────────── -->
<div class="download-progress" id="downloadProgress">
  <div class="progress-text" id="downloadText">Preparing download...</div>
  <div class="progress-bar"><div class="progress-fill" id="downloadFill"></div></div>
</div>

<script>
// ── Config ──────────────────────────────────────────────────────────────────
var CLOUD_NAME   = 'duyreeset';
var UPLOAD_PRESET = 'david_chen_portfolio';
var API_BASE     = '/api/gallery-api';
var CONFIG_URL   = 'https://res.cloudinary.com/' + CLOUD_NAME + '/raw/upload/gallery-config.json';
var IMG_BASE     = 'https://res.cloudinary.com/' + CLOUD_NAME + '/image/upload/';
var THUMB        = 'w_400,h_400,c_fill,q_auto,f_auto/';
var FULL_OPTS    = 'q_auto,f_auto/';

var password         = '';
var config           = null;
var sortables        = {};
var currentPrivateId = null;
var currentTab       = null;
var selectMode       = {}; // per-gallery select mode state

// Confirm modal state
var confirmAction    = null; // function to call on confirm

// Gallery modal state
var galleryModalAction = null; // function to call on submit

// ── Auth ─────────────────────────────────────────────────────────────────────
async function login() {
  var pw  = document.getElementById('passwordInput').value;
  var btn = document.getElementById('loginBtn');
  var err = document.getElementById('loginError');
  if (!pw) { err.textContent = 'Please enter your password.'; return; }
  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    var res = await fetch(API_BASE + '?action=auth', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: pw }) });
    if (res.ok) {
      password = pw;
      sessionStorage.setItem('adminPass', pw);
      err.textContent = '';
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminShell').style.display  = 'block';
      await loadConfig();
    } else {
      err.textContent = 'Incorrect password. Please try again.';
    }
  } catch (e) {
    err.textContent = 'Connection error. Are Netlify functions deployed?';
  }
  btn.disabled = false; btn.textContent = 'Sign In';
}

function logout() {
  sessionStorage.removeItem('adminPass');
  location.reload();
}

// Auto-login if session exists
(function() {
  var saved = sessionStorage.getItem('adminPass');
  if (saved) {
    document.getElementById('passwordInput').value = saved;
    password = saved;
    fetch(API_BASE + '?action=auth', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: saved }) })
      .then(function(r) {
        if (r.ok) {
          document.getElementById('loginScreen').style.display = 'none';
          document.getElementById('adminShell').style.display  = 'block';
          loadConfig();
        } else { sessionStorage.removeItem('adminPass'); }
      }).catch(function() {});
  }
})();

// ── Config load/save/migrate ─────────────────────────────────────────────────
function migrateConfig(cfg) {
  if (cfg.publicGalleries) return cfg;
  // Old format: portfolio/people/stuff as top-level arrays
  var pub = [];
  if (cfg.portfolio) pub.push({ id: 'portfolio', name: 'Portfolio', visible: true, photos: cfg.portfolio });
  if (cfg.people) pub.push({ id: 'people', name: 'People', visible: true, photos: cfg.people });
  if (cfg.stuff) pub.push({ id: 'stuff', name: 'Stuff', visible: true, photos: cfg.stuff });
  // If none existed, create defaults
  if (pub.length === 0) pub = [{ id: 'portfolio', name: 'Portfolio', visible: true, photos: [] }];
  return { publicGalleries: pub, privateGalleries: cfg.privateGalleries || [] };
}

async function loadConfig() {
  try {
    var res = await fetch(CONFIG_URL + '?t=' + Date.now());
    config  = res.ok ? await res.json() : { publicGalleries: [{ id: 'portfolio', name: 'Portfolio', visible: true, photos: [] }], privateGalleries: [] };
  } catch (e) {
    config = { publicGalleries: [{ id: 'portfolio', name: 'Portfolio', visible: true, photos: [] }], privateGalleries: [] };
  }
  config = migrateConfig(config);
  renderTabs();
  renderPrivateList();
}

async function saveConfig() {
  var res = await fetch(API_BASE + '?action=save-config', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password, config })
  });
  return res.ok;
}

// ── Dynamic Tabs ─────────────────────────────────────────────────────────────
function renderTabs() {
  var tabBar = document.getElementById('tabBar');
  var container = document.getElementById('panelContainer');
  tabBar.innerHTML = '';
  container.innerHTML = '';

  // Public gallery tabs
  config.publicGalleries.forEach(function(g, i) {
    var tabBtn = document.createElement('button');
    tabBtn.className = 'tab' + (i === 0 ? ' active' : '');
    tabBtn.textContent = g.name;
    tabBtn.dataset.galleryId = g.id;
    tabBtn.onclick = function() { switchTab(g.id); };
    tabBar.appendChild(tabBtn);

    // Build panel
    var panel = document.createElement('div');
    panel.className = 'panel' + (i === 0 ? ' active' : '');
    panel.id = 'panel-' + g.id;

    var visLabel = g.visible ? '<span class="visibility-badge visible">Visible</span>' : '<span class="visibility-badge hidden">Hidden</span>';

    panel.innerHTML =
      '<div class="toolbar">' +
        '<h2>' + escHtml(g.name) + visLabel + '</h2>' +
        '<span class="save-status" id="status-' + g.id + '"></span>' +
        '<span class="selection-info" id="sel-info-' + g.id + '" style="display:none;"></span>' +
        '<button class="btn btn-sm btn-danger" id="sel-delete-' + g.id + '" style="display:none;" onclick="deleteSelected(\'' + g.id + '\')">Delete Selected</button>' +
        '<button class="btn btn-sm btn-blue" id="sel-download-' + g.id + '" style="display:none;" onclick="downloadSelected(\'' + g.id + '\')">Download Selected</button>' +
        '<button class="btn btn-sm btn-outline" id="sel-start-' + g.id + '" style="display:none;" onclick="moveSelected(\'' + g.id + '\', \'start\')">Move to Start</button>' +
        '<button class="btn btn-sm btn-outline" id="sel-end-' + g.id + '" style="display:none;" onclick="moveSelected(\'' + g.id + '\', \'end\')">Move to End</button>' +
        '<button class="btn btn-sm btn-outline" id="sel-clear-' + g.id + '" style="display:none;" onclick="deselectAll(\'' + g.id + '\')">Deselect</button>' +
        '<button class="btn btn-sm btn-outline" id="sel-toggle-' + g.id + '" onclick="toggleSelectMode(\'' + g.id + '\')">Select</button>' +
        '<button class="btn btn-sm" onclick="openUpload(\'' + g.id + '\')">+ Upload</button>' +
        '<button class="btn btn-sm btn-blue" onclick="downloadAll(\'' + g.id + '\')">Download All</button>' +
        '<button class="btn btn-sm btn-success" onclick="saveOrder(\'' + g.id + '\')">Save Order</button>' +
        '<button class="btn btn-sm btn-outline" onclick="renamePublicGallery(\'' + g.id + '\')">Rename</button>' +
        '<button class="btn btn-sm btn-outline" onclick="toggleVisibility(\'' + g.id + '\')">' + (g.visible ? 'Hide' : 'Show') + '</button>' +
        '<button class="btn btn-sm btn-danger" onclick="deletePublicGallery(\'' + g.id + '\')">Delete</button>' +
      '</div>' +
      '<div class="photo-grid" id="grid-' + g.id + '"></div>';
    container.appendChild(panel);

    renderGrid(g.id, g.photos);
  });

  // + New Gallery button
  var addBtn = document.createElement('button');
  addBtn.className = 'tab-add';
  addBtn.title = 'Add new public gallery';
  addBtn.textContent = '+';
  addBtn.onclick = function() { openCreateGallery('public'); };
  tabBar.appendChild(addBtn);

  // Private Galleries tab (always last)
  var privTab = document.createElement('button');
  privTab.className = 'tab' + (config.publicGalleries.length === 0 ? ' active' : '');
  privTab.textContent = 'Private Galleries';
  privTab.dataset.galleryId = 'private';
  privTab.onclick = function() { switchTab('private'); };
  tabBar.appendChild(privTab);

  // Activate first tab
  currentTab = config.publicGalleries.length > 0 ? config.publicGalleries[0].id : 'private';
  if (config.publicGalleries.length === 0) {
    document.getElementById('panel-private').classList.add('active');
  }
}

function switchTab(id) {
  // Exit select mode on previous tab if active
  if (currentTab && selectMode[currentTab]) toggleSelectMode(currentTab);
  document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.panel').forEach(function(p) { p.classList.remove('active'); });
  var tab = document.querySelector('.tab[data-gallery-id="' + id + '"]');
  if (tab) tab.classList.add('active');
  var panel = document.getElementById('panel-' + id);
  if (panel) panel.classList.add('active');
  currentTab = id;
}

// ── Grid rendering ────────────────────────────────────────────────────────────
function renderGrid(gallery, photos) {
  var grid = document.getElementById('grid-' + gallery);
  if (!grid) return;
  grid.innerHTML = '';

  if (!photos || photos.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div class="icon">📷</div><h3>No photos yet</h3><p>Click "+ Upload" to add images to this gallery.</p></div>';
    return;
  }

  photos.forEach(function(publicId) {
    grid.appendChild(makeCard(publicId, gallery));
  });

  // Init SortableJS (plain drag, no MultiDrag)
  if (sortables[gallery]) sortables[gallery].destroy();
  sortables[gallery] = new Sortable(grid, {
    animation: 150,
    ghostClass: 'sortable-ghost',
    filter: '.card-btn',
    preventOnFilter: false,
    disabled: !!selectMode[gallery],
  });

  // Re-apply select mode visuals if active
  if (selectMode[gallery]) {
    grid.querySelectorAll('.photo-card').forEach(function(c) { c.classList.add('select-mode'); });
  }
}

function makeCard(publicId, gallery) {
  var card = document.createElement('div');
  card.className = 'photo-card' + (selectMode[gallery] ? ' select-mode' : '');
  card.dataset.id = publicId;

  var img = document.createElement('img');
  img.src = IMG_BASE + THUMB + publicId;
  img.alt = publicId.split('/').pop();
  img.loading = 'lazy';

  var actions = document.createElement('div');
  actions.className = 'card-actions';

  var delBtn = document.createElement('button');
  delBtn.className = 'card-btn card-btn-delete';
  delBtn.textContent = '\u00d7';
  delBtn.title = 'Delete photo';
  delBtn.onclick = function(e) { e.stopPropagation(); askDeleteSingle(publicId, gallery); };

  var hint = document.createElement('div');
  hint.className = 'drag-hint';
  hint.textContent = selectMode[gallery] ? 'click to select' : 'drag to reorder';

  // Click to toggle selection in select mode
  card.addEventListener('click', function(e) {
    if (!selectMode[gallery]) return;
    if (e.target.classList.contains('card-btn')) return;
    card.classList.toggle('selected');
    updateSelectionUI(gallery);
  });

  actions.appendChild(delBtn);
  card.appendChild(img);
  card.appendChild(actions);
  card.appendChild(hint);
  return card;
}

// ── Select Mode & Selection UI ───────────────────────────────────────────────
function toggleSelectMode(gallery) {
  selectMode[gallery] = !selectMode[gallery];
  var grid = document.getElementById('grid-' + gallery);
  var toggleBtn = document.getElementById('sel-toggle-' + gallery);

  if (selectMode[gallery]) {
    // Enter select mode: disable drag, change cursor
    if (toggleBtn) { toggleBtn.textContent = 'Done'; toggleBtn.classList.add('btn-select-active'); }
    if (sortables[gallery]) sortables[gallery].option('disabled', true);
    if (grid) grid.querySelectorAll('.photo-card').forEach(function(c) {
      c.classList.add('select-mode');
    });
    // Update hints
    if (grid) grid.querySelectorAll('.drag-hint').forEach(function(h) { h.textContent = 'click to select'; });
  } else {
    // Exit select mode: re-enable drag, clear selections
    if (toggleBtn) { toggleBtn.textContent = 'Select'; toggleBtn.classList.remove('btn-select-active'); }
    if (sortables[gallery]) sortables[gallery].option('disabled', false);
    if (grid) {
      grid.querySelectorAll('.photo-card').forEach(function(c) {
        c.classList.remove('select-mode');
        c.classList.remove('selected');
      });
      grid.querySelectorAll('.drag-hint').forEach(function(h) { h.textContent = 'drag to reorder'; });
    }
    updateSelectionUI(gallery);
  }
}

function getSelectedIds(gallery) {
  var grid = document.getElementById('grid-' + gallery);
  if (!grid) return [];
  return Array.from(grid.querySelectorAll('.photo-card.selected')).map(function(c) { return c.dataset.id; });
}

function updateSelectionUI(gallery) {
  var ids = getSelectedIds(gallery);
  var count = ids.length;
  var infoEl = document.getElementById('sel-info-' + gallery);
  var delEl = document.getElementById('sel-delete-' + gallery);
  var dlEl = document.getElementById('sel-download-' + gallery);
  var startEl = document.getElementById('sel-start-' + gallery);
  var endEl = document.getElementById('sel-end-' + gallery);
  var clearEl = document.getElementById('sel-clear-' + gallery);
  if (!infoEl) return;

  if (count > 0) {
    infoEl.textContent = count + ' selected';
    infoEl.style.display = '';
    delEl.style.display = '';
    dlEl.style.display = '';
    if (startEl) startEl.style.display = '';
    if (endEl) endEl.style.display = '';
    clearEl.style.display = '';
  } else {
    infoEl.style.display = 'none';
    delEl.style.display = 'none';
    dlEl.style.display = 'none';
    if (startEl) startEl.style.display = 'none';
    if (endEl) endEl.style.display = 'none';
    clearEl.style.display = 'none';
  }
}

function deselectAll(gallery) {
  var grid = document.getElementById('grid-' + gallery);
  if (!grid) return;
  grid.querySelectorAll('.photo-card.selected').forEach(function(c) { c.classList.remove('selected'); });
  updateSelectionUI(gallery);
}

function moveSelected(gallery, direction) {
  var selectedIds = getSelectedIds(gallery);
  if (selectedIds.length === 0) return;

  // Get the photos array from config
  var photos;
  if (gallery === 'private') {
    var pg = config.privateGalleries.find(function(g) { return g.id === currentPrivateId; });
    if (!pg) return;
    photos = pg.photos;
  } else {
    var pub = config.publicGalleries.find(function(g) { return g.id === gallery; });
    if (!pub) return;
    photos = pub.photos;
  }

  // Split into selected and remaining, preserving relative order
  var selectedSet = {};
  selectedIds.forEach(function(id) { selectedSet[id] = true; });
  var selected = photos.filter(function(id) { return selectedSet[id]; });
  var rest = photos.filter(function(id) { return !selectedSet[id]; });

  // Rebuild array with selected at start or end
  var newOrder;
  if (direction === 'start') {
    newOrder = selected.concat(rest);
  } else {
    newOrder = rest.concat(selected);
  }

  // Update config
  if (gallery === 'private') {
    config.privateGalleries.find(function(g) { return g.id === currentPrivateId; }).photos = newOrder;
  } else {
    config.publicGalleries.find(function(g) { return g.id === gallery; }).photos = newOrder;
  }

  // Re-render grid (preserves select mode) and re-select the moved photos
  renderGrid(gallery, newOrder);
  var grid = document.getElementById('grid-' + gallery);
  if (grid) {
    grid.querySelectorAll('.photo-card').forEach(function(c) {
      if (selectedSet[c.dataset.id]) c.classList.add('selected');
    });
  }
  updateSelectionUI(gallery);
  toast('Moved ' + selected.length + ' photo' + (selected.length > 1 ? 's' : '') + ' to ' + direction + '. Click Save Order to save.');
}

// ── Upload ────────────────────────────────────────────────────────────────────
function openUpload(gallery) {
  var folder;
  if (gallery === 'private') {
    folder = 'private/' + currentPrivateId;
  } else {
    folder = gallery;
  }

  cloudinary.openUploadWidget({
    cloudName:    CLOUD_NAME,
    uploadPreset: UPLOAD_PRESET,
    folder:       folder,
    multiple:     true,
    maxFiles:     50,
    sources:      ['local', 'camera'],
    clientAllowedFormats: ['jpg', 'jpeg', 'png', 'webp', 'heic'],
    styles: { palette: { window: '#FFFFFF', windowBorder: '#1a1a1a', tabIcon: '#1a1a1a', menuIcons: '#1a1a1a', textDark: '#1a1a1a', textLight: '#FFFFFF', link: '#1a1a1a', action: '#1a1a1a', inactiveTabIcon: '#888', error: '#c0392b', inProgress: '#27ae60', complete: '#27ae60', sourceBg: '#f5f5f5' } }
  }, function(error, result) {
    if (error) { toast('Upload error: ' + (error.statusText || error)); return; }
    if (result && result.event === 'success') {
      var publicId = result.info.public_id;
      if (gallery === 'private') {
        var pg = config.privateGalleries.find(function(g) { return g.id === currentPrivateId; });
        if (pg) { pg.photos.push(publicId); renderGrid('private', pg.photos); }
      } else {
        var pub = config.publicGalleries.find(function(g) { return g.id === gallery; });
        if (pub) { pub.photos.push(publicId); renderGrid(gallery, pub.photos); }
      }
    }
    if (result && result.event === 'close') {
      var statusKey = gallery;
      setStatus(statusKey, 'saving');
      saveConfig().then(function(ok) { setStatus(statusKey, ok ? 'saved' : 'error'); });
    }
  });
}

// ── Save order ────────────────────────────────────────────────────────────────
async function saveOrder(gallery) {
  var grid = document.getElementById('grid-' + gallery);
  if (!grid) return;

  var cards = grid.querySelectorAll('.photo-card');
  var ordered = Array.from(cards).map(function(c) { return c.dataset.id; });

  if (gallery === 'private') {
    var pg = config.privateGalleries.find(function(g) { return g.id === currentPrivateId; });
    if (pg) pg.photos = ordered;
  } else {
    var pub = config.publicGalleries.find(function(g) { return g.id === gallery; });
    if (pub) pub.photos = ordered;
  }

  setStatus(gallery, 'saving');
  var ok = await saveConfig();
  setStatus(gallery, ok ? 'saved' : 'error');
  if (ok) toast('Order saved!');
}

function setStatus(gallery, state) {
  var el = document.getElementById('status-' + gallery);
  if (!el) return;
  el.className = 'save-status ' + state;
  el.textContent = state === 'saving' ? 'Saving…' : state === 'saved' ? 'Saved ✓' : state === 'error' ? 'Save failed ✗' : '';
  if (state === 'saved') setTimeout(function() { el.textContent = ''; el.className = 'save-status'; }, 3000);
}

// ── Delete (single & batch) ──────────────────────────────────────────────────
function askDeleteSingle(publicId, gallery) {
  confirmAction = function() { doDeletePhotos([publicId], gallery); };
  document.getElementById('confirmTitle').textContent = 'Delete Photo?';
  document.getElementById('confirmDesc').textContent = 'This will permanently remove the photo from Cloudinary. This cannot be undone.';
  document.getElementById('confirmModal').classList.add('open');
}

function deleteSelected(gallery) {
  var ids = getSelectedIds(gallery);
  if (ids.length === 0) return;
  confirmAction = function() { doDeletePhotos(ids, gallery); };
  document.getElementById('confirmTitle').textContent = 'Delete ' + ids.length + ' Photo' + (ids.length > 1 ? 's' : '') + '?';
  document.getElementById('confirmDesc').textContent = 'This will permanently remove ' + ids.length + ' photo' + (ids.length > 1 ? 's' : '') + ' from Cloudinary. This cannot be undone.';
  document.getElementById('confirmModal').classList.add('open');
}

function cancelConfirm() {
  confirmAction = null;
  document.getElementById('confirmModal').classList.remove('open');
}

function execConfirm() {
  document.getElementById('confirmModal').classList.remove('open');
  if (confirmAction) { confirmAction(); confirmAction = null; }
}

async function doDeletePhotos(publicIds, gallery) {
  toast('Deleting ' + publicIds.length + ' photo' + (publicIds.length > 1 ? 's' : '') + '…');

  // Delete from Cloudinary
  await fetch(API_BASE + '?action=delete-photo', {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password, publicIds: publicIds })
  });

  // Remove from config
  var idsSet = {};
  publicIds.forEach(function(id) { idsSet[id] = true; });

  if (gallery === 'private') {
    var pg = config.privateGalleries.find(function(g) { return g.id === currentPrivateId; });
    if (pg) { pg.photos = pg.photos.filter(function(id) { return !idsSet[id]; }); renderGrid('private', pg.photos); }
  } else {
    var pub = config.publicGalleries.find(function(g) { return g.id === gallery; });
    if (pub) { pub.photos = pub.photos.filter(function(id) { return !idsSet[id]; }); renderGrid(gallery, pub.photos); }
  }

  await saveConfig();
  toast(publicIds.length + ' photo' + (publicIds.length > 1 ? 's' : '') + ' deleted.');
}

// ── Public Gallery Management ────────────────────────────────────────────────
function renamePublicGallery(id) {
  var g = config.publicGalleries.find(function(g) { return g.id === id; });
  if (!g) return;
  openGalleryModal('Rename Gallery', 'Enter a new name for this gallery.', g.name, 'Rename', function(name) {
    g.name = name;
    saveConfig().then(function() { renderTabs(); switchTab(id); toast('Gallery renamed!'); });
  });
}

function toggleVisibility(id) {
  var g = config.publicGalleries.find(function(g) { return g.id === id; });
  if (!g) return;
  g.visible = !g.visible;
  setStatus(id, 'saving');
  saveConfig().then(function(ok) {
    setStatus(id, ok ? 'saved' : 'error');
    renderTabs();
    switchTab(id);
    toast(g.visible ? 'Gallery is now visible on site.' : 'Gallery hidden from site.');
  });
}

function deletePublicGallery(id) {
  var g = config.publicGalleries.find(function(g) { return g.id === id; });
  if (!g) return;
  confirmAction = function() {
    config.publicGalleries = config.publicGalleries.filter(function(g) { return g.id !== id; });
    saveConfig().then(function() { renderTabs(); toast('Gallery "' + g.name + '" deleted.'); });
  };
  document.getElementById('confirmTitle').textContent = 'Delete "' + g.name + '" Gallery?';
  document.getElementById('confirmDesc').textContent = 'This will remove the gallery from your site. Photos will remain on Cloudinary.';
  document.getElementById('confirmModal').classList.add('open');
}

// ── Private Gallery Management ───────────────────────────────────────────────
function renderPrivateList() {
  var list = document.getElementById('privateGalleryList');
  list.innerHTML = '';
  var galleries = config.privateGalleries || [];

  if (galleries.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">🔒</div><h3>No private galleries yet</h3><p>Create a gallery and share its secret link with your client.</p></div>';
    return;
  }

  galleries.forEach(function(g) {
    var siteOrigin = window.location.origin;
    var link = siteOrigin + '/gallery/?id=' + g.id;

    var row = document.createElement('div');
    row.className = 'gallery-row';
    row.innerHTML =
      '<div class="gallery-row-info">' +
        '<div class="gallery-row-name">' + escHtml(g.name) + '</div>' +
        '<div class="gallery-row-meta">' + (g.photos ? g.photos.length : 0) + ' photos &nbsp;·&nbsp; Created ' + (g.created || 'recently') + '</div>' +
      '</div>' +
      '<div class="gallery-row-actions">' +
        '<button class="btn btn-sm btn-outline copy-link-btn" onclick="copyLink(this, \'' + link + '\')"><span class="copy-tooltip">Copied!</span>Copy Link</button>' +
        '<button class="btn btn-sm btn-outline" onclick="renamePrivateGallery(\'' + g.id + '\')">Rename</button>' +
        '<button class="btn btn-sm" onclick="openPrivateEditor(\'' + g.id + '\', \'' + escHtml(g.name) + '\')">Manage Photos</button>' +
        '<button class="btn btn-sm btn-danger" onclick="deleteGallery(\'' + g.id + '\')">Delete</button>' +
      '</div>';
    list.appendChild(row);
  });
}

function copyLink(btn, link) {
  navigator.clipboard.writeText(link).then(function() {
    btn.classList.add('copied');
    setTimeout(function() { btn.classList.remove('copied'); }, 2000);
  });
}

function openPrivateEditor(id, name) {
  currentPrivateId = id;
  document.getElementById('privateEditorTitle').textContent = name;
  document.getElementById('privateToolbar').style.display = 'none';
  document.getElementById('privateGalleryList').style.display = 'none';
  document.getElementById('privateGalleryEditor').style.display = 'block';
  var pg = config.privateGalleries.find(function(g) { return g.id === id; });
  renderGrid('private', pg ? pg.photos : []);
}

function closePrivateEditor() {
  // Exit select mode if active
  if (selectMode['private']) toggleSelectMode('private');
  currentPrivateId = null;
  document.getElementById('privateToolbar').style.display = '';
  document.getElementById('privateGalleryList').style.display = '';
  document.getElementById('privateGalleryEditor').style.display = 'none';
}

function renamePrivateGallery(id) {
  var g = config.privateGalleries.find(function(g) { return g.id === id; });
  if (!g) return;
  openGalleryModal('Rename Gallery', 'Enter a new name for this gallery.', g.name, 'Rename', function(name) {
    g.name = name;
    saveConfig().then(function() { renderPrivateList(); toast('Gallery renamed!'); });
  });
}

async function deleteGallery(id) {
  confirmAction = function() {
    config.privateGalleries = config.privateGalleries.filter(function(g) { return g.id !== id; });
    saveConfig().then(function() { renderPrivateList(); toast('Gallery deleted.'); });
  };
  document.getElementById('confirmTitle').textContent = 'Delete Gallery?';
  document.getElementById('confirmDesc').textContent = 'Delete this entire gallery? This cannot be undone.';
  document.getElementById('confirmModal').classList.add('open');
}

// ── Gallery Modal (create / rename) ──────────────────────────────────────────
function openGalleryModal(title, desc, value, btnText, onSubmit) {
  document.getElementById('galleryModalTitle').textContent = title;
  document.getElementById('galleryModalDesc').textContent = desc;
  document.getElementById('galleryModalInput').value = value || '';
  document.getElementById('galleryModalBtn').textContent = btnText;
  galleryModalAction = onSubmit;
  document.getElementById('galleryModal').classList.add('open');
  document.getElementById('galleryModalInput').focus();
}

function closeGalleryModal() {
  document.getElementById('galleryModal').classList.remove('open');
  document.getElementById('galleryModalInput').value = '';
  galleryModalAction = null;
}

function submitGalleryModal() {
  var name = document.getElementById('galleryModalInput').value.trim();
  if (!name) return;
  var action = galleryModalAction;
  closeGalleryModal();
  if (action) action(name);
}

function openCreateGallery(type) {
  if (type === 'public') {
    openGalleryModal('New Public Gallery', 'Enter a name for this gallery. It will appear in the site navigation.', '', 'Create', function(name) {
      createPublicGallery(name);
    });
  } else {
    openGalleryModal('New Private Gallery', 'Enter a name for this client gallery. A secret link will be created that only people with the link can access.', '', 'Create', function(name) {
      createPrivateGallery(name);
    });
  }
}

async function createPublicGallery(name) {
  var res = await fetch(API_BASE + '?action=create-gallery', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password, type: 'public' }) });
  var data = await res.json();
  var gallery = { id: data.id, name: name, visible: true, photos: [] };
  config.publicGalleries.push(gallery);
  await saveConfig();
  renderTabs();
  switchTab(data.id);
  toast('Gallery "' + name + '" created!');
}

async function createPrivateGallery(name) {
  var res = await fetch(API_BASE + '?action=create-gallery', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password }) });
  var data = await res.json();
  var gallery = { id: data.id, name: name, created: new Date().toLocaleDateString(), photos: [] };
  if (!config.privateGalleries) config.privateGalleries = [];
  config.privateGalleries.push(gallery);
  await saveConfig();
  renderPrivateList();
  toast('Gallery "' + name + '" created!');
}

// ── Download ─────────────────────────────────────────────────────────────────
function downloadAll(gallery) {
  var photos, name;
  if (gallery === 'private') {
    var pg = config.privateGalleries.find(function(g) { return g.id === currentPrivateId; });
    if (!pg || !pg.photos || pg.photos.length === 0) { toast('No photos to download.'); return; }
    photos = pg.photos;
    name = pg.name;
  } else {
    var pub = config.publicGalleries.find(function(g) { return g.id === gallery; });
    if (!pub || !pub.photos || pub.photos.length === 0) { toast('No photos to download.'); return; }
    photos = pub.photos;
    name = pub.name;
  }
  downloadPhotos(photos, name);
}

function downloadSelected(gallery) {
  var ids = getSelectedIds(gallery);
  if (ids.length === 0) { toast('No photos selected.'); return; }
  var name;
  if (gallery === 'private') {
    var pg = config.privateGalleries.find(function(g) { return g.id === currentPrivateId; });
    name = pg ? pg.name : 'gallery';
  } else {
    var pub = config.publicGalleries.find(function(g) { return g.id === gallery; });
    name = pub ? pub.name : 'gallery';
  }
  downloadPhotos(ids, name + ' (selected)');
}

async function downloadPhotos(publicIds, galleryName) {
  if (typeof JSZip === 'undefined') { toast('Download library not loaded. Please refresh.'); return; }

  var prog = document.getElementById('downloadProgress');
  var text = document.getElementById('downloadText');
  var fill = document.getElementById('downloadFill');
  prog.classList.add('active');
  fill.style.width = '0%';

  var zip = new JSZip();
  var total = publicIds.length;
  var failed = 0;

  for (var i = 0; i < total; i++) {
    text.textContent = 'Downloading ' + (i + 1) + ' of ' + total + '…';
    fill.style.width = Math.round(((i + 1) / total) * 90) + '%';
    try {
      var url = IMG_BASE + FULL_OPTS + publicIds[i];
      var resp = await fetch(url);
      if (!resp.ok) { failed++; continue; }
      var blob = await resp.blob();
      var ext = blob.type === 'image/png' ? '.png' : blob.type === 'image/webp' ? '.webp' : '.jpg';
      var filename = publicIds[i].split('/').pop() + ext;
      zip.file(filename, blob);
    } catch (e) { failed++; }
  }

  text.textContent = 'Creating zip file…';
  fill.style.width = '95%';

  try {
    var content = await zip.generateAsync({ type: 'blob' });
    var safeName = galleryName.replace(/[^a-zA-Z0-9 _-]/g, '').trim() || 'photos';
    saveAs(content, safeName + '.zip');
    fill.style.width = '100%';
    text.textContent = 'Download complete!';
  } catch (e) {
    text.textContent = 'Error creating zip.';
  }

  setTimeout(function() { prog.classList.remove('active'); }, 2000);
  if (failed > 0) toast(failed + ' photo(s) could not be downloaded.');
}

// ── Helpers ───────────────────────────────────────────────────────────────────
var toastTimer = null;
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.remove('show'); }, 3000);
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
