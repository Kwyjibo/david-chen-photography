<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>David Chen Photography</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --font: 'DM Sans', sans-serif;
    --black: #1a1a1a;
    --white: #ffffff;
    --gray: #888;
    --gap: 7px;
    --nav-height: 80px;
  }
  body { font-family: var(--font), sans-serif; color: var(--black); background: var(--white); -webkit-font-smoothing: antialiased; }
  a { color: inherit; text-decoration: none; }

  nav { position: fixed; top: 0; left: 0; right: 0; height: var(--nav-height); display: flex; align-items: center; justify-content: space-between; padding: 0 48px; z-index: 100; transition: background 0.3s, color 0.3s; }
  nav.light { background: var(--white); color: var(--black); }
  nav.dark { background: transparent; color: var(--white); }
  .logo { display: flex; align-items: center; }
  .logo-img { height: 40px; width: auto; object-fit: contain; transition: opacity 0.3s, height 0.3s; }
  nav.large-logo .logo-img { height: 80px; }
  nav.large-logo { height: 100px; }
  .logo-img:hover { opacity: 0.7; }
  nav.dark .logo-img { filter: brightness(0) invert(1); }

  .nav-links { display: flex; align-items: center; gap: 48px; list-style: none; }
  .nav-links a { font-size: 14px; font-weight: 400; letter-spacing: 1.5px; text-transform: capitalize; position: relative; padding-bottom: 2px; }
  .nav-links a.active { border-bottom: 1px solid currentColor; }
  .nav-links a:hover { opacity: 0.7; }
  .nav-links .ig-icon svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 1.8; }

  .hamburger { display: none; background: none; border: none; cursor: pointer; width: 28px; height: 20px; position: relative; z-index: 200; }
  .hamburger span { display: block; width: 100%; height: 1.5px; background: currentColor; position: absolute; left: 0; transition: all 0.3s; }
  .hamburger span:nth-child(1) { top: 0; }
  .hamburger span:nth-child(2) { top: 50%; transform: translateY(-50%); }
  .hamburger span:nth-child(3) { bottom: 0; }
  .hamburger.open span:nth-child(1) { top: 50%; transform: translateY(-50%) rotate(45deg); }
  .hamburger.open span:nth-child(2) { opacity: 0; }
  .hamburger.open span:nth-child(3) { bottom: 50%; transform: translateY(50%) rotate(-45deg); }

  .logo-overview { display: none; align-items: center; }
  .logo-overview-img { height: 65px; width: auto; object-fit: contain; transition: opacity 0.3s; }
  .logo-overview-img:hover { opacity: 0.7; }
  nav.overview-nav .logo { display: none; }
  nav.overview-nav .logo-overview { display: flex; }
  nav.overview-nav { height: 100px; }
  nav:not(.overview-nav) .logo { display: flex; }
  nav:not(.overview-nav) .logo-overview { display: none; }

  .section { display: none !important; }
  .section.active { display: block !important; }
  .section.contact-section.active { display: flex !important; }

  .gallery-section { padding-left: 48px; padding-right: 48px; padding-bottom: 80px; padding-top: 0; }
  .overview-gallery { padding-top: 120px; }
  .masonry { columns: 4; column-gap: var(--gap); }
  .masonry-item { break-inside: avoid; margin-bottom: var(--gap); cursor: pointer; overflow: hidden; position: relative; }
  .masonry-item::after { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0); transition: background 0.9s ease 1s; pointer-events: none; }
  .masonry-item:hover::after { background: rgba(0,0,0,0.35); }
  .masonry-item img { width: 100%; height: auto; display: block; transition: transform 0.9s ease 1s; }
  .masonry-item:hover img { transform: scale(1.105); }

  .empty-gallery { padding: 80px 48px; text-align: center; color: #999; font-size: 15px; }

  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 600; justify-content: center; align-items: center; }
  .modal-overlay.open { display: flex; }
  .modal-box { background: var(--white); padding: 48px 40px; max-width: 460px; width: 90%; text-align: center; box-shadow: 0 8px 40px rgba(0,0,0,0.15); }
  .modal-box p { font-size: 16px; font-weight: 400; color: var(--black); line-height: 1.7; margin-bottom: 28px; }
  .modal-close { display: inline-block; padding: 14px 40px; background: var(--black); color: var(--white); font-family: inherit; font-size: 12px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; border: none; cursor: pointer; transition: background 0.25s; }
  .modal-close:hover { background: #333; }

  .contact-section { position: relative; width: 100%; min-height: 100vh; overflow: hidden; align-items: center; justify-content: center; background: var(--white); }
  .contact-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; width: 100%; padding: 120px 48px 80px; max-width: 1400px; align-items: start; margin: 0 auto; }
  .contact-form-side { width: 100%; padding-top: 80px; }
  .contact-photo-side { display: flex; justify-content: center; align-items: flex-start; padding-top: 20px; }
  .contact-photo-side img { width: 100%; max-width: 480px; height: auto; object-fit: cover; display: block; }
  .contact-form { display: flex; flex-direction: column; gap: 24px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group-label-row { display: flex; align-items: baseline; gap: 6px; }
  .form-group label { font-size: 14px; font-weight: 600; color: var(--black); }
  .form-group .required-text { font-size: 12px; font-weight: 400; color: var(--gray); }
  .form-group input, .form-group textarea {
    background: #f5f5f5; border: 1px solid #e0e0e0; color: var(--black);
    font-family: inherit; font-size: 15px; font-weight: 400; padding: 14px 16px;
    outline: none; transition: border-color 0.25s, background 0.25s; border-radius: 0; -webkit-appearance: none;
  }
  .form-group input::placeholder, .form-group textarea::placeholder { color: #bbb; }
  .form-group input:focus, .form-group textarea:focus { border-color: #999; background: #fff; }
  .form-group textarea { resize: vertical; min-height: 150px; line-height: 1.6; }
  .contact-submit { display: inline-block; margin-top: 8px; padding: 18px 48px; background: var(--black); color: var(--white); font-family: inherit; font-size: 12px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; border: none; cursor: pointer; transition: background 0.25s; align-self: flex-start; }
  .contact-submit:hover { background: #333; }
  .contact-alt { margin-top: 40px; font-size: 14px; font-weight: 400; color: #555; letter-spacing: 0.2px; line-height: 1.8; }
  .contact-alt a { color: var(--black); text-decoration: none; font-weight: 500; transition: opacity 0.2s; }
  .contact-alt a:hover { opacity: 0.6; }

  .sub-gallery-section { padding: calc(100px + 40px) 48px 80px; }
  .sub-gallery-section .masonry { columns: 3; }

  .lightbox { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.88); z-index: 500; justify-content: center; align-items: center; cursor: pointer; }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 85vw; max-height: 85vh; object-fit: contain; cursor: default; box-shadow: 0 4px 40px rgba(0,0,0,0.15); border: 10px solid white; }
  .lightbox-close { position: absolute; top: 24px; right: 32px; background: none; border: none; color: #333; font-size: 32px; cursor: pointer; font-weight: 300; }

  @media (max-width: 1024px) {
    .masonry { columns: 3; }
    .sub-gallery-section .masonry { columns: 2; }
    nav { padding: 0 32px; }
    .gallery-section, .sub-gallery-section { padding-left: 32px; padding-right: 32px; }
    .contact-layout { padding: 100px 32px 60px; gap: 40px; }
    .form-row { grid-template-columns: 1fr; }
  }
  @media (max-width: 768px) {
    .masonry { columns: 2; }
    .sub-gallery-section .masonry { columns: 2; }
    .nav-links { display: none; }
    .hamburger { display: block; }
    .nav-links.mobile-open { display: flex; flex-direction: column; position: fixed; inset: 0; background: var(--white); color: var(--black); justify-content: center; align-items: center; gap: 36px; z-index: 150; }
    .nav-links.mobile-open a { font-size: 20px; }
    nav.dark .nav-links.mobile-open { background: rgba(20,20,20,0.97); color: var(--white); }
    .contact-layout { grid-template-columns: 1fr; }
    .contact-photo-side { order: -1; }
    .contact-photo-side img { max-width: 360px; }
  }
  @media (max-width: 480px) {
    .masonry { columns: 1; }
    .sub-gallery-section .masonry { columns: 1; }
    nav { padding: 0 20px; }
    .gallery-section { padding-left: 20px; padding-right: 20px; }
    .sub-gallery-section { padding-left: 20px; padding-right: 20px; }
    .contact-layout { padding: 100px 20px 60px; }
    .logo-overview-img { height: 60px; }
  }

  .pricing-section { background: var(--white); min-height: 100vh; padding: 180px 40px 80px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
  .pricing-header { display: none; }
  .pricing-title { font-family: 'Georgia', 'Times New Roman', serif; font-size: clamp(32px, 4vw, 52px); font-weight: 400; color: #333; margin-bottom: 20px; }
  .pricing-subtitle { font-size: 15px; font-weight: 300; color: #888; max-width: 600px; margin: 0 auto; line-height: 1.7; }
  .pricing-cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 32px; width: 100%; max-width: 70%; margin: 0 auto; }
  .pricing-card { display: flex; flex-direction: column; text-align: center; }
  .pricing-card-image { width: 95%; aspect-ratio: 3 / 4; object-fit: cover; margin: 0 auto 28px; }
  .pricing-card-image-placeholder { width: 95%; aspect-ratio: 3 / 4; background: #f0f0f0; margin: 0 auto 28px; }
  .pricing-card-name { font-family: 'Georgia', 'Times New Roman', serif; font-size: 26px; font-weight: 700; color: #929292; margin-bottom: 20px; }
  .pricing-card-description { font-size: 20px; font-weight: 400; color: #888; line-height: 1.8; margin-bottom: 28px; flex-grow: 1; padding: 0 8px; }
  .pricing-card-divider { border: none; border-top: 1px solid #ccc; margin: 0 auto 20px; width: 100%; }
  .pricing-card-price { font-size: 22px; font-weight: 700; color: #555; letter-spacing: 3px; text-transform: uppercase; }
  @media (max-width: 1024px) { .pricing-cards { grid-template-columns: repeat(2, 1fr); gap: 32px; } .pricing-section { padding: 100px 32px 60px; } }
  @media (max-width: 768px) { .pricing-cards { grid-template-columns: 1fr; max-width: 560px; } }
  @media (max-width: 480px) { .pricing-section { padding: 100px 20px 60px; } }

  .splash { position: fixed; inset: 0; background: var(--white); z-index: 9999; display: flex; justify-content: center; align-items: center; opacity: 1; transition: opacity 0.6s ease; }
  .splash.fade-out { opacity: 0; pointer-events: none; }
  .splash img { height: 80px; width: auto; opacity: 0; animation: splashFadeIn 1.2s ease forwards; }
  @keyframes splashFadeIn { 0% { opacity: 0; transform: scale(0.85); } 100% { opacity: 1; transform: scale(1.05); } }
</style>
</head>
<body>

<div class="splash" id="splash">
  <img src="logo.png" alt="David Chen Photography">
</div>

<nav class="light overview-nav" id="mainNav">
  <a href="#" class="logo" onclick="showFirstGallery()"><img src="logo.png" alt="David Chen Photography" class="logo-img"></a>
  <a href="#" class="logo-overview" onclick="showFirstGallery()"><img src="logo.png" alt="David Chen Photography" class="logo-overview-img"></a>
  <ul class="nav-links" id="navLinks">
    <li id="pricingNavItem"><a href="#" data-section="pricing" onclick="showSection('pricing')">Pricing</a></li>
    <li><a href="#" data-section="contact" onclick="showSection('contact')">Contact</a></li>
    <li><a href="https://instagram.com" target="_blank" class="ig-icon" aria-label="Instagram"><svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/></svg></a></li>
  </ul>
  <button class="hamburger" id="hamburger" onclick="toggleMobile()"><span></span><span></span><span></span></button>
</nav>

<div id="gallerySections"></div>

<div class="section pricing-section" id="pricing">
  <div class="pricing-header">
    <h2 class="pricing-title" id="pricingTitle"></h2>
  </div>
  <div class="pricing-cards" id="pricingCards"></div>
</div>

<div class="section contact-section" id="contact">
  <div class="contact-layout">
    <div class="contact-form-side">
      <form class="contact-form" name="contact" method="POST" data-netlify="true" onsubmit="handleSubmit(event)">
        <input type="hidden" name="form-name" value="contact">
        <div class="form-group">
          <div class="form-group-label-row"><label for="name">Name</label><span class="required-text">(required)</span></div>
          <input type="text" id="name" name="name" required>
        </div>
        <div class="form-group">
          <div class="form-group-label-row"><label for="email">Email Address</label><span class="required-text">(required)</span></div>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
          <div class="form-group-label-row"><label for="message">Message</label><span class="required-text">(required)</span></div>
          <textarea id="message" name="message" required></textarea>
        </div>
        <button type="submit" class="contact-submit">Submit</button>
      </form>
      <div class="contact-alt" id="contactAlt">
        Please fill out contact form or you can reach me at<br>
        <a href="mailto:David@davidchenphotography.com">David@davidchenphotography.com</a>
      </div>
    </div>
    <div class="contact-photo-side">
      <img src="photos/david-portrait.webp" alt="David Chen - Photographer" id="contactPhoto">
    </div>
  </div>
</div>

<div class="modal-overlay" id="thankYouModal" onclick="closeModal(event)">
  <div class="modal-box">
    <p>Thank you for your message.<br>I will get in touch soon.</p>
    <button class="modal-close" onclick="closeModal()">Close</button>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
  <img src="" alt="" id="lightboxImg">
</div>

<script>
// ── Cloudinary config ────────────────────────────────────────────────────────
var CLOUD_NAME  = 'duyreeset';
var CONFIG_URL  = 'https://res.cloudinary.com/' + CLOUD_NAME + '/raw/upload/gallery-config.json';
var IMG_BASE    = 'https://res.cloudinary.com/' + CLOUD_NAME + '/image/upload/';
var THUMB_OPTS  = 'w_900,c_scale,q_auto,f_auto/';
var FULL_OPTS   = 'q_auto,f_auto/';

var galleryConfig  = null;
var loadedGrids    = {};
var galleryIds     = []; // ordered list of visible gallery IDs
var firstGalleryId = null;

// ── Config migration ─────────────────────────────────────────────────────────
function migrateConfig(cfg) {
  if (!cfg.publicGalleries) {
    var pub = [];
    if (cfg.portfolio) pub.push({ id: 'portfolio', name: 'Portfolio', visible: true, photos: cfg.portfolio });
    if (cfg.people) pub.push({ id: 'people', name: 'People', visible: true, photos: cfg.people });
    if (cfg.stuff) pub.push({ id: 'stuff', name: 'Stuff', visible: true, photos: cfg.stuff });
    if (pub.length === 0) pub = [{ id: 'portfolio', name: 'Portfolio', visible: true, photos: [] }];
    cfg = { publicGalleries: pub, privateGalleries: cfg.privateGalleries || [] };
  }
  if (!cfg.pricing) {
    cfg.pricing = {
      title: 'Portrait Packages',
      cards: [
        { id: 'card-default-1', name: 'Classic Portrait Session', description: 'Up to 5 people (groups more than 5, additional fee applies)\nOutdoor location or in your home\nSession up to 1 hour\nPrivate online gallery\n15 artistically edited full resolution images', price: 'Starting at $629', imagePublicId: '' },
        { id: 'card-default-2', name: 'Signature Portrait Session', description: 'Up to 5 people (groups more than 5, additional fee applies)\nOutdoor location or in your home\nSession up to 1 hour\nPrivate online gallery\n30 artistically edited full resolution images', price: 'Starting at $829', imagePublicId: '' },
        { id: 'card-default-3', name: 'Luxe Portrait Session', description: 'Up to 6 people (groups more than 6, additional fee applies)\nOutdoor location or in your home\nSession up to 1.5 hours\nPrivate online gallery\n50+ artistically edited full resolution images', price: 'Starting at $1,129', imagePublicId: '' },
        { id: 'card-default-4', name: 'Event Photography', description: 'Birthday and holiday parties or any other non-wedding event\nSession up to 2 hours\n$300 up to each additional hour\nPrivate online gallery\n100+ artistically edited full resolution images', price: 'Starting at $1,299', imagePublicId: '' }
      ]
    };
  }
  // Migrate pricing cards
  if (cfg.pricing && cfg.pricing.cards) {
    cfg.pricing.cards.forEach(function(card) {
      if (card.features && !card.description) {
        card.description = card.features.join('\n');
        delete card.features;
      }
      if (card.imagePublicId === undefined) card.imagePublicId = '';
    });
  }
  if (!cfg.contact) {
    cfg.contact = {
      email: 'David@davidchenphotography.com',
      altText: 'Please fill out contact form or you can reach me at',
      photoPublicId: ''
    };
  }
  return cfg;
}

async function fetchConfig() {
  if (galleryConfig) return galleryConfig;
  try {
    var res = await fetch(CONFIG_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('no config');
    galleryConfig = migrateConfig(await res.json());
  } catch (e) {
    galleryConfig = { publicGalleries: [{ id: 'portfolio', name: 'Portfolio', visible: true, photos: [] }], privateGalleries: [] };
  }
  return galleryConfig;
}

function buildImageUrl(publicId, opts) {
  return IMG_BASE + opts + publicId;
}

function populateGridFromConfig(gridId, photos) {
  var grid = document.getElementById(gridId);
  if (!grid) return;
  grid.innerHTML = '';

  if (!photos || photos.length === 0) {
    grid.innerHTML = '<p class="empty-gallery">No photos yet.</p>';
    return;
  }

  photos.forEach(function(publicId, i) {
    var item = document.createElement('div');
    item.className = 'masonry-item';
    var img = document.createElement('img');
    img.src = buildImageUrl(publicId, THUMB_OPTS);
    img.alt = 'Photo ' + (i + 1);
    img.loading = 'lazy';
    var fullSrc = buildImageUrl(publicId, FULL_OPTS);
    item.appendChild(img);
    item.addEventListener('click', function() { openLightbox(fullSrc); });
    grid.appendChild(item);
  });
}

// ── Build dynamic nav + sections ─────────────────────────────────────────────
function buildGalleries(config) {
  var navList = document.getElementById('navLinks');
  var pricingItem = document.getElementById('pricingNavItem');
  var container = document.getElementById('gallerySections');
  container.innerHTML = '';
  galleryIds = [];

  var visibleGalleries = (config.publicGalleries || []).filter(function(g) { return g.visible; });

  visibleGalleries.forEach(function(g, i) {
    galleryIds.push(g.id);

    // Nav link (insert before Pricing)
    var li = document.createElement('li');
    var a = document.createElement('a');
    a.href = '#';
    a.dataset.section = g.id;
    a.textContent = g.name;
    if (i === 0) a.classList.add('active');
    a.onclick = function(e) { e.preventDefault(); showSection(g.id); };
    li.appendChild(a);
    navList.insertBefore(li, pricingItem);

    // Gallery section
    var sec = document.createElement('div');
    sec.id = g.id;
    if (i === 0) {
      sec.className = 'section active';
      sec.innerHTML = '<div class="gallery-section overview-gallery"><div class="masonry" id="grid-' + g.id + '"></div></div>';
    } else {
      sec.className = 'section sub-gallery-section';
      sec.innerHTML = '<div class="masonry" id="grid-' + g.id + '"></div>';
    }
    container.appendChild(sec);
  });

  firstGalleryId = galleryIds.length > 0 ? galleryIds[0] : null;
}

function showFirstGallery() {
  if (firstGalleryId) showSection(firstGalleryId);
}

// ── Section switching ────────────────────────────────────────────────────────
function showSection(name) {
  var sections = document.querySelectorAll('.section');
  sections.forEach(function(s) { s.classList.remove('active'); });
  var links = document.querySelectorAll('.nav-links a[data-section]');
  links.forEach(function(l) { l.classList.remove('active'); });

  var sec = document.getElementById(name);
  if (sec) sec.classList.add('active');
  var activeLink = document.querySelector('.nav-links a[data-section="' + name + '"]');
  if (activeLink) activeLink.classList.add('active');

  // Nav style: first gallery gets overview-nav, other galleries get large-logo
  var nav = document.getElementById('mainNav');
  nav.className = 'light';
  if (name === firstGalleryId || name === 'contact' || name === 'pricing') {
    nav.classList.add('overview-nav');
  } else if (galleryIds.indexOf(name) > 0) {
    nav.classList.add('large-logo');
  }

  closeMobile();
  window.scrollTo(0, 0);

  // Lazy load gallery photos
  if (galleryIds.indexOf(name) !== -1 && !loadedGrids[name]) {
    loadedGrids[name] = true;
    var g = galleryConfig.publicGalleries.find(function(pg) { return pg.id === name; });
    if (g) populateGridFromConfig('grid-' + g.id, g.photos);
  }
}

// ── Lightbox ─────────────────────────────────────────────────────────────────
function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox(e) {
  if (e && e.target.tagName === 'IMG') return;
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeLightbox(); });

// ── Contact form ─────────────────────────────────────────────────────────────
function handleSubmit(e) {
  e.preventDefault();
  var form = e.target;
  var data = new FormData(form);
  fetch('/', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: new URLSearchParams(data).toString() })
    .then(function(response) {
      if (!response.ok) { throw new Error('Netlify returned ' + response.status); }
      form.reset();
      document.getElementById('thankYouModal').classList.add('open');
    })
    .catch(function(err) {
      alert('Something went wrong. Please email david@davidchenphotography.com directly.');
      console.error('Form submission error:', err);
    });
}
function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('thankYouModal').classList.remove('open');
}

// ── Mobile nav ───────────────────────────────────────────────────────────────
function toggleMobile() {
  document.getElementById('navLinks').classList.toggle('mobile-open');
  document.getElementById('hamburger').classList.toggle('open');
}
function closeMobile() {
  document.getElementById('navLinks').classList.remove('mobile-open');
  document.getElementById('hamburger').classList.remove('open');
}

// ── Dynamic Pricing ──────────────────────────────────────────────────────────
function escHtml(str) {
  var d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function sanitizeDesc(str) {
  if (!str) return '';
  // Escape HTML first, then restore only <b>, <i>, <u> tags
  var safe = escHtml(str);
  safe = safe.replace(/&lt;(\/?(b|i|u))&gt;/gi, '<$1>');
  // Convert newlines to <br> for line breaks
  safe = safe.replace(/\n/g, '<br>');
  return safe;
}

function renderPricing(config) {
  var pricing = config.pricing;
  if (!pricing) return;
  var titleEl = document.getElementById('pricingTitle');
  if (titleEl) titleEl.textContent = pricing.title || 'Pricing';
  var container = document.getElementById('pricingCards');
  if (!container) return;
  container.innerHTML = '';
  (pricing.cards || []).forEach(function(card) {
    var div = document.createElement('div');
    div.className = 'pricing-card';
    var imageHtml = card.imagePublicId
      ? '<img class="pricing-card-image" src="' + IMG_BASE + 'w_600,h_800,c_fill,q_auto,f_auto/' + card.imagePublicId + '" alt="' + escHtml(card.name) + '">'
      : '<div class="pricing-card-image-placeholder"></div>';
    div.innerHTML =
      imageHtml +
      '<h3 class="pricing-card-name">' + escHtml(card.name) + '</h3>' +
      '<p class="pricing-card-description">' + sanitizeDesc(card.description || '') + '</p>' +
      '<hr class="pricing-card-divider">' +
      '<p class="pricing-card-price">' + escHtml(card.price) + '</p>';
    container.appendChild(div);
  });
}

// ── Dynamic Contact ─────────────────────────────────────────────────────────
function renderContact(config) {
  var contact = config.contact;
  if (!contact) return;
  var altEl = document.getElementById('contactAlt');
  if (altEl) {
    altEl.innerHTML = escHtml(contact.altText) + '<br><a href="mailto:' + escHtml(contact.email) + '">' + escHtml(contact.email) + '</a>';
  }
  if (contact.photoPublicId) {
    var photoEl = document.getElementById('contactPhoto');
    if (photoEl) photoEl.src = IMG_BASE + FULL_OPTS + contact.photoPublicId;
  }
}

// ── Init ─────────────────────────────────────────────────────────────────────
(async function init() {
  var config = await fetchConfig();
  buildGalleries(config);
  renderPricing(config);
  renderContact(config);
  // Load first gallery immediately
  if (firstGalleryId) {
    var first = config.publicGalleries.find(function(g) { return g.id === firstGalleryId; });
    if (first) {
      populateGridFromConfig('grid-' + first.id, first.photos);
      loadedGrids[firstGalleryId] = true;
    }
  }
})();

setTimeout(function() {
  var splash = document.getElementById('splash');
  splash.classList.add('fade-out');
  setTimeout(function() { splash.remove(); }, 600);
}, 2000);
</script>
</body>
